<!DOCTYPE html>
<html>
<head>
  <title>Generate icon16.png</title>
</head>
<body>
  <h1>Icon 16x16 Generator</h1>
  <p>Click the button to download icon16.png with purple background and "AI" text</p>
  
  <canvas id="icon16" width="16" height="16" style="border: 1px solid #ddd; image-rendering: pixelated; width: 160px; height: 160px;"></canvas>
  <br>
  <button onclick="downloadIcon()">Download icon16.png</button>

  <script>
    function drawIcon() {
      const canvas = document.getElementById('icon16');
      const ctx = canvas.getContext('2d');
      
      // Purple gradient background matching icon128.png
      const gradient = ctx.createLinearGradient(0, 0, 16, 16);
      gradient.addColorStop(0, '#8B5CF6');  // Purple
      gradient.addColorStop(1, '#7C3AED');  // Darker purple
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, 16, 16);
      
      // Draw a simple tab shape (browser window with tab) as outline
      ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
      ctx.lineWidth = 1;
      
      // Draw browser window with tab (smaller tab height)
      ctx.beginPath();
      // Start from bottom left
      ctx.moveTo(2, 14);
      // Left side
      ctx.lineTo(2, 3);
      // Connect to tab
      ctx.lineTo(3, 3);
      // Tab top (smaller height - was 1, now 2)
      ctx.lineTo(3, 2);
      ctx.lineTo(8, 2);
      ctx.lineTo(8, 3);
      // Right side of window
      ctx.lineTo(13, 3);
      ctx.lineTo(13, 14);
      // Bottom
      ctx.lineTo(2, 14);
      ctx.stroke();
      
      // White "AI" text (50% bigger and moved further down)
      ctx.fillStyle = 'white';
      ctx.font = 'bold 12px Arial';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('AI', 8, 12);
    }
    
    function downloadIcon() {
      const canvas = document.getElementById('icon16');
      const link = document.createElement('a');
      link.download = 'icon16.png';
      link.href = canvas.toDataURL();
      link.click();
    }
    
    // Draw the icon on load
    drawIcon();
  </script>
</body>
</html>
