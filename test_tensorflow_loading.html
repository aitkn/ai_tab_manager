<!DOCTYPE html>
<html>
<head>
    <title>Test TensorFlow.js Loading</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            line-height: 1.6;
        }
        .status {
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
        }
        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
        pre {
            background: #f5f5f5;
            padding: 10px;
            border-radius: 5px;
            overflow-x: auto;
        }
    </style>
</head>
<body>
    <h1>TensorFlow.js Loading Test</h1>
    
    <div id="results"></div>
    
    <script>
        const results = document.getElementById('results');
        
        function addResult(message, type = 'info') {
            const div = document.createElement('div');
            div.className = `status ${type}`;
            div.innerHTML = message;
            results.appendChild(div);
        }
        
        // Test 1: Check if file exists
        addResult('Testing TensorFlow.js bundle...', 'info');
        
        // Test 2: Try loading the script
        const script = document.createElement('script');
        script.src = 'tensorflow.min.js';
        
        script.onload = () => {
            addResult('✅ TensorFlow.js loaded successfully!', 'success');
            
            // Test 3: Check if tf is available
            if (typeof tf !== 'undefined') {
                addResult(`✅ TensorFlow.js version: ${tf.version.tfjs}`, 'success');
                
                // Test 4: Try creating a simple tensor
                try {
                    const tensor = tf.tensor([1, 2, 3, 4]);
                    const shape = tensor.shape;
                    tensor.dispose();
                    
                    addResult(`✅ TensorFlow.js is functional! Created test tensor with shape: [${shape}]`, 'success');
                    
                    // Test 5: Check available backends
                    addResult(`ℹ️ Available backends: ${Object.keys(tf.engine().registryFactory).join(', ')}`, 'info');
                    addResult(`ℹ️ Current backend: ${tf.getBackend()}`, 'info');
                    
                } catch (error) {
                    addResult(`❌ Error creating tensor: ${error.message}`, 'error');
                }
                
                // Show memory info
                const memInfo = tf.memory();
                addResult(`ℹ️ Memory usage: <pre>${JSON.stringify(memInfo, null, 2)}</pre>`, 'info');
                
            } else {
                addResult('❌ TensorFlow.js loaded but tf object not found', 'error');
            }
        };
        
        script.onerror = (error) => {
            addResult(`❌ Failed to load TensorFlow.js: ${error}`, 'error');
            addResult('Make sure tensorflow.min.js is in the same directory as this test file', 'error');
        };
        
        document.head.appendChild(script);
        
        // Test 6: Simulate Chrome extension environment
        setTimeout(() => {
            addResult('<h3>Chrome Extension Environment Test</h3>', 'info');
            
            // Check if we're in an extension context
            if (typeof chrome !== 'undefined' && chrome.runtime && chrome.runtime.getURL) {
                const extensionUrl = chrome.runtime.getURL('tensorflow.min.js');
                addResult(`ℹ️ Extension URL would be: ${extensionUrl}`, 'info');
            } else {
                addResult('ℹ️ Not running in Chrome extension context (this is normal for standalone test)', 'info');
            }
        }, 1000);
    </script>
</body>
</html>
